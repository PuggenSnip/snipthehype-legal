<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snip The Hype — TikTok authorization</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.6;color:#222}
  code{background:#f2f2f2;padding:10px;display:block;word-break:break-all;border-radius:6px;margin:12px 0}
  button{padding:8px 16px;border-radius:6px;border:1px solid #888;background:#fff;cursor:pointer}
  .ok{color:#0a7a2f}
</style>
</head>
<body>
<h1>TikTok authorization</h1>
<div id="out">Waiting for the authorization code…</div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get("code");
  var out = document.getElementById("out");
  if (code) {
    out.innerHTML =
      "<p>Authorization succeeded. Paste this code into the " +
      "<b>tiktok_upload.py --auth</b> prompt:</p>" +
      "<code id='c'></code>" +
      "<button onclick=\"navigator.clipboard.writeText(document.getElementById('c').textContent)" +
      ".then(function(){document.getElementById('copied').textContent=' copied!'})\">Copy code</button>" +
      "<span id='copied' class='ok'></span>";
    document.getElementById("c").textContent = code;
  } else if (p.get("error")) {
    out.textContent = "Authorization failed: " +
      (p.get("error_description") || p.get("error"));
  }
</script>
</body>
</html>
